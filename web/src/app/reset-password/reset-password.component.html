<div class="row justify-content-center align-items-center min-vh-75">
  <div class="col-12 col-md-6 col-lg-4 px-3">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-4 p-md-5">
        
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock text-primary display-1"></i>
          <h2 class="fw-bold mt-2">{{ 'RESET_PASSWORD.TITLE' | translate }}</h2>
          <p class="text-muted">{{ 'RESET_PASSWORD.SUBTITLE' | translate }}</p>
        </div>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
          
          <!-- Új jelszó -->
          <div class="mb-3">
            <label class="form-label fw-medium small text-secondary">{{ 'RESET_PASSWORD.LABEL_NEW' | translate }}</label>
            <div class="input-group has-validation">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
              <input type="password" 
                     class="form-control bg-light border-start-0"
                     formControlName="password"
                     [class.is-invalid]="resetForm.get('password')?.invalid && resetForm.get('password')?.touched"
                     [placeholder]="'REGISTER.FIELDS.PASS_PLACEHOLDER' | translate">
              <div class="invalid-feedback">
                {{ 'RESET_PASSWORD.ERRORS.LENGTH' | translate }}
              </div>
            </div>
          </div>

          <!-- Megerősítés -->
          <div class="mb-4">
            <label class="form-label fw-medium small text-secondary">{{ 'RESET_PASSWORD.LABEL_CONFIRM' | translate }}</label>
            <div class="input-group has-validation">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-check2-circle"></i></span>
              <input type="password" 
                     class="form-control bg-light border-start-0"
                     formControlName="confirmPassword"
                     [class.is-invalid]="resetForm.get('confirmPassword')?.touched && (resetForm.get('confirmPassword')?.invalid || resetForm.hasError('mismatch'))"
                     [placeholder]="'REGISTER.FIELDS.PASS_PLACEHOLDER' | translate">
              <div class="invalid-feedback">
                {{ 'RESET_PASSWORD.ERRORS.MISMATCH' | translate }}
              </div>
            </div>
          </div>

          @if (errorMessage) {
            <div class="alert alert-danger py-2 mb-3 border-0 small text-center animate__animated animate__shakeX">
              <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
            </div>
          }

          <button type="submit" [disabled]="resetForm.invalid || isLoading" class="btn btn-primary w-100 py-2 rounded-3 shadow-sm d-flex justify-content-center align-items-center">
            @if (isLoading) {
              <span class="spinner-border spinner-border-sm me-2"></span>
              {{ 'REGISTER.BUTTON.LOADING' | translate }}
            } @else {
              <span class="fw-bold">{{ 'RESET_PASSWORD.SUBMIT_BTN' | translate }}</span>
            }
          </button>
        </form>

        <div class="text-center mt-4">
          <a (click)="goToLogin()" class="back-to-login-link text-muted text-decoration-none small">
            <i class="bi bi-arrow-left me-1"></i> {{ 'RESET_PASSWORD.BACK_TO_LOGIN' | translate }}
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
