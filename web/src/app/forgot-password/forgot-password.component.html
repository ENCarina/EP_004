<div class="row justify-content-center align-items-center min-vh-75">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-question-circle display-1"></i>
          <h2 class="fw-bold mt-2">{{ 'FORGOT_PASSWORD.TITLE' | translate }}</h2>
          <p class="text-muted small">{{ 'FORGOT_PASSWORD.SUBTITLE' | translate }}</p>
        </div>

        @if (message) {
          <div [ngClass]="isError ? 'alert-danger' : 'alert-success'" class="alert py-2 mb-3 border-0 small text-center">
             <i class="bi" [ngClass]="isError ? 'bi-exclamation-triangle' : 'bi-check-circle'"></i> {{ message }}
          </div>
        }

        <form (ngSubmit)="sendEmail()" #forgotForm="ngForm">
          <div class="mb-4">
            <label class="form-label fw-medium small">{{ 'FORGOT_PASSWORD.EMAIL_LABEL' | translate }}</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" 
                     name="email"
                     class="form-control" 
                     [(ngModel)]="email" 
                     required 
                     email
                     [placeholder]="'FORGOT_PASSWORD.EMAIL_PLACEHOLDER' | translate">
            </div>
          </div>

          <button type="submit" [disabled]="forgotForm.invalid || isLoading" class="btn btn-primary w-100">
            @if (isLoading) {
              <span class="spinner-border spinner-border-sm me-2"></span> {{ 'FORGOT_PASSWORD.SENDING' | translate }}
            } @else {
              {{ 'FORGOT_PASSWORD.SEND_BTN' | translate }}
            }
          </button>
        </form>

        <div class="text-center mt-4">
          <a routerLink="/login" class="text-muted text-decoration-none small hover-blue">
            <i class="bi bi-arrow-left me-1"></i> {{ 'FORGOT_PASSWORD.BACK_TO_LOGIN' | translate }}
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
