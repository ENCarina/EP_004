<div class="nopage-wrapper">
  <div class="card nopage-card text-center">
    <div class="card-body p-5">
      <div class="error-icon">
        <i class="bi bi-exclamation-circle"></i>
      </div>
      
      <h1 class="display-4 fw-bold mb-2">
        {{ 'ERROR_PAGES.NOT_FOUND.TITLE' | translate }}
      </h1>
      <h2 class="h5 mb-4 fw-light text-secondary text-uppercase">
        {{ 'ERROR_PAGES.NOT_FOUND.SUBTITLE' | translate }}
      </h2>
      
      <p class="mb-5 text-muted" [innerHTML]="'ERROR_PAGES.NOT_FOUND.MESSAGE' | translate"></p>

      <div class="d-grid gap-2 col-md-10 mx-auto">
        <a routerLink="/home" class="btn btn-primary btn-lg text-white shadow-sm">
           {{ 'ERROR_PAGES.NOT_FOUND.BACK_BUTTON' | translate }}
        </a>
      </div>
    </div>
  </div>
</div>
